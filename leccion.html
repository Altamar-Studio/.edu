<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Lección | EstudiandoAndo</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&family=Homemade+Apple&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'ea-cream': '#F9F9F9',
                        'ea-dark': '#0A0A0A',
                    },
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .text-serif { font-family: 'Cormorant Garamond', serif; }
        
        /* Animaciones para feedback */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.3s ease-out forwards; }
        
        .feedback-bar {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
        }
        .feedback-bar.show { transform: translateY(0); }
    </style>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-white dark:bg-neutral-950 text-ea-dark dark:text-white font-sans selection:bg-black selection:text-white transition-colors duration-300 h-screen flex flex-col overflow-hidden">

    <!-- Top Bar: Close, Progress, Lives -->
    <header class="w-full max-w-4xl mx-auto px-4 sm:px-8 py-6 flex items-center justify-between gap-4 sm:gap-8 shrink-0">
        <a href="curso-ingles.html" class="w-10 h-10 rounded-full hover:bg-black/5 dark:hover:bg-white/10 flex items-center justify-center transition-colors text-black/50 dark:text-white/50 hover:text-black dark:hover:text-white">
            <span class="material-symbols-outlined text-[28px]">close</span>
        </a>
        
        <div class="flex-1 bg-gray-200 dark:bg-neutral-800 rounded-full h-4 overflow-hidden border border-black/5 dark:border-white/5">
            <div id="progress-bar" class="bg-blue-600 h-full rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
        </div>
        
        <div class="flex items-center gap-2 font-bold text-lg">
            <span class="text-red-500 drop-shadow-sm">❤️</span>
            <span id="lives-counter" class="text-ea-dark dark:text-white">5</span>
        </div>
    </header>

    <!-- Main Content: Exercise Area -->
    <main class="flex-1 w-full max-w-3xl mx-auto px-4 sm:px-8 py-4 sm:py-10 flex flex-col overflow-y-auto" id="exercise-container">
        <!-- JS will inject exercise here -->
    </main>

    <!-- Bottom Bar: Check Button & Feedback -->
    <footer class="w-full border-t border-black/10 dark:border-white/10 relative shrink-0">
        
        <!-- Feedback Overlay -->
        <div id="feedback-bar" class="feedback-bar absolute inset-0 z-10 hidden flex-col sm:flex-row items-start sm:items-center justify-between px-4 sm:px-12 py-6 sm:py-0">
            <div class="flex items-center gap-4 mb-4 sm:mb-0">
                <div id="feedback-icon-container" class="w-14 h-14 rounded-full flex items-center justify-center bg-white text-3xl font-bold">
                    <span id="feedback-icon" class="material-symbols-outlined text-[36px]">check</span>
                </div>
                <div>
                    <h3 id="feedback-title" class="text-2xl font-bold">¡Correcto!</h3>
                    <p id="feedback-subtitle" class="text-sm font-medium opacity-80 hidden">Respuesta correcta: X</p>
                </div>
            </div>
            <!-- Continuar Button -->
            <button id="btn-continue" aria-label="Continuar" class="w-full sm:w-auto px-10 py-4 rounded-2xl font-bold text-lg shadow-sm hover:opacity-90 transition-opacity uppercase tracking-wider focus:outline-none focus:ring-4 focus:ring-white/50">
                Continuar
            </button>
        </div>

        <!-- Normal State Footer -->
        <div class="max-w-4xl mx-auto px-4 sm:px-8 py-6 flex justify-end">
            <button id="btn-check" aria-label="Comprobar respuesta" aria-disabled="true" class="w-full sm:w-48 bg-gray-200 text-gray-400 dark:bg-neutral-800 dark:text-neutral-500 cursor-not-allowed px-8 py-4 rounded-2xl font-bold text-lg uppercase tracking-wider transition-colors focus:outline-none focus:ring-4 focus:ring-blue-500/50">
                Comprobar
            </button>
        </div>
    </footer>

    <!-- Out of Energy Modal -->
    <div id="modal-game-over" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-neutral-900 border border-black/10 dark:border-white/10 p-8 sm:p-12 rounded-[32px] shadow-2xl max-w-md w-full text-center animate-pop">
            <div class="text-6xl mb-6 drop-shadow-md">💔</div>
            <h2 class="text-3xl font-bold mb-4 text-ea-dark dark:text-white">Te quedaste sin vidas</h2>
            <p class="text-sm opacity-60 mb-8 font-medium">Espera un momento para que se recarguen tus vidas o repasa la teoría.</p>
            <button onclick="window.location.href='curso-ingles.html'" class="w-full block bg-black dark:bg-white text-white dark:text-black py-4 rounded-xl text-lg font-bold shadow-sm hover:scale-105 transition-transform">
                Terminar por hoy
            </button>
        </div>
    </div>

    
    <!-- Success Modal -->
    <div id="modal-success" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm hidden items-center justify-center p-4">
        <!-- Confetti wrapper -->
        <div class="absolute inset-0 pointer-events-none overflow-hidden" id="confetti-container"></div>
        
        <div class="bg-white dark:bg-neutral-900 border border-black/10 dark:border-white/10 p-8 sm:p-10 rounded-[32px] shadow-2xl max-w-md w-full text-center animate-pop relative z-10">
            <h2 class="text-3xl font-bold mb-6 text-ea-dark dark:text-white">¡Lección Completada!</h2>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800/50 p-4 rounded-2xl flex flex-col items-center">
                    <span class="text-3xl mb-1 drop-shadow-sm">⭐</span>
                    <span class="text-xs font-bold uppercase tracking-widest opacity-60 text-yellow-600 dark:text-yellow-500 mb-1">XP Ganado</span>
                    <span class="text-2xl font-bold text-yellow-600 dark:text-yellow-400" id="summary-xp">+15</span>
                </div>
                <div class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800/50 p-4 rounded-2xl flex flex-col items-center">
                    <span class="text-3xl mb-1 drop-shadow-sm">🎯</span>
                    <span class="text-xs font-bold uppercase tracking-widest opacity-60 text-green-600 dark:text-green-500 mb-1">Precisión</span>
                    <span class="text-2xl font-bold text-green-600 dark:text-green-400" id="summary-accuracy">100%</span>
                </div>
            </div>
            
            <div class="flex items-center justify-between bg-orange-50 dark:bg-orange-900/20 border border-orange-200 dark:border-orange-800/50 p-4 rounded-2xl mb-8">
                <div class="flex items-center gap-3">
                    <span class="text-3xl drop-shadow-sm">🔥</span>
                    <div class="text-left">
                        <span class="block text-xs font-bold uppercase tracking-widest opacity-60 text-orange-600 dark:text-orange-500">Racha Actual</span>
                        <span class="text-lg font-bold text-orange-600 dark:text-orange-400" id="summary-streak">3 Días</span>
                    </div>
                </div>
            </div>
            
            <div id="achievements-container" class="mb-8 hidden">
                <h4 class="text-xs font-bold uppercase tracking-widest opacity-40 mb-3">Nuevos Logros</h4>
                <div class="flex flex-col gap-2" id="achievements-list"></div>
            </div>

            <button onclick="window.location.href='curso-ingles.html'" class="w-full block bg-black dark:bg-white text-white dark:text-black py-4 rounded-xl text-lg font-bold shadow-sm hover:scale-105 transition-transform border border-transparent">
                Continuar
            </button>
        </div>
    </div>


    <script src="userProfile.js"></script>
    <script src="leccion.js"></script>
</body>
</html>
